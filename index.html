<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Channels</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
}

.container {
    margin-top: 40px;
}

/* GRID SYSTEM */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 per row */
    gap: 10px;
    width: 90%;
    margin: auto;
}

.btn {
    padding: 15px;
    font-size: 16px;
    background: #0088cc;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

/* CLICK KE BAAD YELLOW */
.btn.joined {
    background: #facc15;
    color: black;
}

.whatsapp-btn {
    background: #25D366;
    width: 90%;
    margin-top: 20px;
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
}

.whatsapp-btn:disabled {
    background: gray;
}
</style>

</head>
<body>

<div class="container">
    <h2>Join All Telegram Channels</h2>

    <div class="grid">
        <button class="btn" onclick="joinChannel(this,0,'https://t.me/channel1')">Channel 1</button>
        <button class="btn" onclick="joinChannel(this,1,'https://t.me/channel2')">Channel 2</button>
        <button class="btn" onclick="joinChannel(this,2,'https://t.me/channel3')">Channel 3</button>
        <button class="btn" onclick="joinChannel(this,3,'https://t.me/channel4')">Channel 4</button>
        <button class="btn" onclick="joinChannel(this,4,'https://t.me/channel5')">Channel 5</button>
    </div>

    <button id="finalBtn" class="whatsapp-btn" disabled onclick="openWhatsApp()">
        Then Get Agent
    </button>
</div>

<script>
let joined = [false, false, false, false, false];

function joinChannel(btn, index, link) {
    window.open(link, "_blank");

    if (!joined[index]) {
        joined[index] = true;
        btn.classList.add("joined");
        btn.innerText = "Joined ✅";
        checkAllJoined();
    }
}

function checkAllJoined() {
    if (joined.every(v => v === true)) {
        document.getElementById("finalBtn").disabled = false;
    }
}

function openWhatsApp() {
    let number = "919XXXXXXXXX";
    let msg = "Hello, I want to get agent details";
    window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`, "_blank");
}
</script>

</body>
</html>
