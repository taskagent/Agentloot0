<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Channels</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
}

.container {
    margin-top: 50px;
}

.btn {
    display: block;
    width: 80%;
    margin: 10px auto;
    padding: 15px;
    font-size: 18px;
    background: #0088cc;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.btn.joined {
    background: #22c55e; /* green */
}

.btn:disabled {
    background: gray;
    cursor: not-allowed;
}

.whatsapp-btn {
    background: #25D366;
}
</style>

</head>
<body>

<div class="container">
    <h2>Join All Telegram Channels</h2>

    <button class="btn" onclick="joinChannel(this,0,'https://t.me/channel1')">Join Channel 1</button>
    <button class="btn" onclick="joinChannel(this,1,'https://t.me/channel2')">Join Channel 2</button>
    <button class="btn" onclick="joinChannel(this,2,'https://t.me/channel3')">Join Channel 3</button>
    <button class="btn" onclick="joinChannel(this,3,'https://t.me/channel4')">Join Channel 4</button>
    <button class="btn" onclick="joinChannel(this,4,'https://t.me/channel5')">Join Channel 5</button>

    <br><br>

    <button id="finalBtn" class="btn whatsapp-btn" disabled onclick="openWhatsApp()">
        Then Get Agent
    </button>
</div>

<script>
let joined = [false, false, false, false, false];

function joinChannel(btn, index, link) {
    window.open(link, "_blank");

    if (!joined[index]) {
        joined[index] = true;

        // button color change
        btn.classList.add("joined");

        // text change
        btn.innerText = "Joined ✅";

        checkAllJoined();
    }
}

function checkAllJoined() {
    if (joined.every(v => v === true)) {
        document.getElementById("finalBtn").disabled = false;
    }
}

function openWhatsApp() {
    let number = "919XXXXXXXXX"; // apna number
    let msg = "Hello, I want to get agent details";
    window.open(`https://wa.me/${number}?text=${encodeURIComponent(msg)}`, "_blank");
}
</script>

</body>
</html>
