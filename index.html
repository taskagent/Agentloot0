<!DOCTYPE html>
<html>
<head>
  <title>Smart Redirect System</title>
  <meta charset="utf-8">
  <script>
    document.addEventListener("DOMContentLoaded", function () {

      var numbers = [
        "918953521890",
        "919654734990",
        "917705938320",
        "918106358158",
        "918258841141",
        "919199622686",
        "919938574834",
        "917250695503",
        "918400585821",
        "919577953232",
        "917433025895",
        "918829861395",
        "919902378370",
        "918304864739",
        "919523172582",
        "917839420652",
        "918093297906",
        "919528168903"
      ];

      var telegramLink = "https://t.me/+6Gxx_I5SnbMzN2Zl";

      var now = new Date().getTime();
      var resetTime = localStorage.getItem("resetTime");
      var clickCount = localStorage.getItem("clickCount");

      // 🔄 24 Hour Reset
      if (!resetTime || now > resetTime) {
        localStorage.setItem("resetTime", now + (24 * 60 * 60 * 1000));
        localStorage.setItem("clickCount", 1);
        clickCount = 1;
      } else {
        clickCount = clickCount ? parseInt(clickCount) + 1 : 1;
        localStorage.setItem("clickCount", clickCount);
      }

      // 🎯 Redirect Logic
      if (clickCount <= 3) {
        var randomNumber = numbers[Math.floor(Math.random() * numbers.length)];
        window.location.replace("https://wa.me/" + randomNumber);
      } else {
        window.location.replace(telegramLink);
      }

    });
  </script>
</head>
<body>
  <h3>Redirecting...</h3>
</body>
</html>
