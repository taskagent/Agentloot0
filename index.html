<!DOCTYPE html>
<html>
<head>
  <title>Work From Home Opportunity</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .highlight {
      color: #00ffcc;
      font-weight: bold;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .btn {
      display: inline-block;
      background: #25D366;
      color: white;
      padding: 15px 25px;
      margin-top: 20px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }

    .btn:hover {
      background: #1ebc59;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Work From Home Opportunity</h1>
    <p class="highlight">Flexible Timing • Online Work • Training Provided</p>

    <div class="box">
      <p>✔ No Investment Required</p>
      <p>✔ Simple Online Tasks</p>
      <p>✔ Support Available</p>
    </div>

    <a class="btn" href="https://wa.me/919999999999" target="_blank">
      Join on WhatsApp
    </a>

    <footer>
      © 2026 Your Company Name. All rights reserved.
    </footer>
  </div>

</body>
</html>
